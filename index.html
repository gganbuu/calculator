<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>gganbuu's calculator</title>
</head>
<body>
    <div class="main-container">
        <div class="heading-container"><h1>gganbuu's calculator</h1></div>
        <div class="calculator-container">
            <div class="calculator-display"></div>
            <div class="calculator-clear"></div>
            <div class="calculator-clearall"></div>
            <div class="calculator-1"></div>
            <div class="calculator-2"></div>
            <div class="calculator-3"></div>
            <div class="calculator-4"></div>
            <div class="calculator-5"></div>
            <div class="calculator-6"></div>
            <div class="calculator-7"></div>
            <div class="calculator-8"></div>
            <div class="calculator-10"></div>
            <div class="calculator-plus"></div>
            <div class="calculator-minus"></div>
            <div class="calculator-times"></div>
            <div class="calculator-divide"></div>
            <div class="calculator-0"></div>
            <div class="calculator-dot"></div>
            <div class="calculator-equals"></div>
        </div>
    </div>
</body>
</html>
