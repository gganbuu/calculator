<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>gganbuu's calculator</title>
</head>
<body>
    <div class="main-container">
        <div class="heading-container"><h1>gganbuu's calculator</h1></div>
        <div class="calculator-container">
            <div class="calculator-display"></div>
            <div class="calculator-1 btn" data-value="1">1</div>
            <div class="calculator-2 btn" data-value="2">2</div>
            <div class="calculator-3 btn" data-value="3">3</div>
            <div class="calculator-4 btn" data-value="4">4</div>
            <div class="calculator-5 btn" data-value="5">5</div>
            <div class="calculator-6 btn" data-value="6">6</div>
            <div class="calculator-7 btn" data-value="7">7</div>
            <div class="calculator-8 btn" data-value="8">8</div>
            <div class="calculator-9 btn" data-value="9">9</div>

            <div class="calculator-add btn" data-action="+">+</div>
            <div class="calculator-subtract btn" data-action="-">-</div>
            <div class="calculator-multiply btn" data-action="×">×</div>
            <div class="calculator-divide btn" data-action="÷">÷</div>

            <div class="calculator-delete btn" data-action="delete">delete</div>
            <div class="calculator-clearall btn" data-action="clear">all clear</div>
            <div class="calculator-equals btn" data-action="equals">=</div>

            <div class="calculator-dot btn" data-value=".">.</div>
            <div class="calculator-0 btn" data-value="0">0</div>
        </div>
    </div>
</body>
</html>
